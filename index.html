<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./p1.css">
</head>
<body>
    <div class="auth-card">
        <!-- Sign Up Form -->
        <form id="signUpForm" class="form active">
            <h2>Sign Up</h2>
            <input type="text" id="fullName" placeholder="Full Name" required>
            <input type="email" id="signUpEmail" placeholder="Email" required>
            <input type="password" id="signUpPassword" placeholder="Password" required>
            <small id="passwordHelp" class="help-text">
                Must be at least 8 characters, include 1 uppercase letter and 1 number
            </small>
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            <button type="submit" id="signUpBtn" disabled>Sign Up</button>
            <p>Already have an account? <span id="toSignIn">Sign In</span></p>
        </form>

        <!-- Sign In Form -->
        <form id="signInForm" class="form">
            <h2>Sign In</h2>
            <input type="email" id="signInEmail" placeholder="Email" required>
            <input type="password" id="signInPassword" placeholder="Password" required>
            <button type="submit" id="signInBtn" disabled>Sign In</button>
            <p>Don't have an account? <span id="toSignUp">Sign Up</span></p>
        </form>
    </div>
    <script src="./p1.js"></script>
</body>
</html>
